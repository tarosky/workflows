name: Auto create Pull Request

on:
  workflow_call:
    inputs:
      destination_branch:
        description: 'Which branch to merge into'
        default: main
        required: false
        type: string
      pr_title:
        description: 'Title of the pull request'
        default: 'Pull staging into main'
        required: false
        type: string
      pr_body:
        description: 'Body of the pull request'
        default: ':rocket: 最新の staging ブランチを main ブランチへマージするPRです。<br />*PRは staging ブランチへの push をトリガーにして自動生成しています。*'
        required: false
        type: string
      pr_label:
        description: 'Label to add to the pull request'
        default: 'for release'
        required: false
        type: string

jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pull-request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR already exists
          EXISTING=$(gh pr list --base "${{ inputs.destination_branch }}" --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists, skipping."
            exit 0
          fi
          gh pr create \
            --base "${{ inputs.destination_branch }}" \
            --title "${{ inputs.pr_title }}" \
            --body "${{ inputs.pr_body }}" \
            --label "${{ inputs.pr_label }}"