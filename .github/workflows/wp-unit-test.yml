name: PHPUnitTest in WordPress CI

on:
  workflow_call:
    inputs:
      php_version:
        description: 'PHP Version to run PHPUnitTest'
        default: 8.0
        required: false
        type: string
      wp_version:
        description: 'WordPress Version to Install'
        default: latest
        required: false
        type: string
      composer_command:
        description: 'Command in composer.json. Default "test"'
        default: test
        required: false
        type: string
      working_directory:
        description: 'Working directory where composer.json is located'
        default: '.'
        required: false
        type: string
      coverage:
        description: 'Enable code coverage report (pcov). Output to GitHub Job Summary.'
        default: false
        required: false
        type: boolean

jobs:
  wp-unit-test:
    name: "PHP Unit test with WordPress ${{ inputs.wp_version }} in PHP ${{ inputs.php_version }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    services:
      mysql:
        image: mysql:8.0
        options:
          --health-cmd "mysqladmin ping --host 127.0.0.1 --port 3306"
          --health-interval=20s
          --health-timeout=10s
          --health-retries=10
        ports:
          - 3306/tcp
        env:
          MYSQL_ROOT_PASSWORD: root
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest requires subversion.
      # see: https://github.com/10up/action-wordpress-plugin-deploy/releases/tag/2.3.0
      - name: Install SVN
        run: sudo apt-get install -y subversion
        
      - name: Setup PHP with composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          coverage: ${{ inputs.coverage && 'pcov' || 'none' }}
          tools: composer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Install dependencies
        run: composer install --no-suggest

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -h 127.0.0.1 --port 3306 -u root --password=root -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'root';"

      - name: Install WordPress
        run: |
          wget https://raw.githubusercontent.com/wp-cli/scaffold-command/main/templates/install-wp-tests.sh
          bash ./install-wp-tests.sh wordpress root root 127.0.0.1:3306 ${{ inputs.wp_version }}

      - name: Run test suite
        if: ${{ !inputs.coverage }}
        run: composer ${{ inputs.composer_command }}

      - name: Run test suite with coverage
        if: ${{ inputs.coverage }}
        run: |
          composer ${{ inputs.composer_command }} -- --coverage-text --coverage-clover=coverage.xml | tee coverage-output.txt

      - name: Output coverage to Job Summary
        if: ${{ inputs.coverage && always() }}
        run: |
          {
            echo '## Code Coverage Report'
            echo ''
            echo '```'
            grep -A 999 'Code Coverage Report:' coverage-output.txt || echo 'No coverage data'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: ${{ inputs.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
